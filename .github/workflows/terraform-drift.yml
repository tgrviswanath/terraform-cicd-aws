name: Terraform Drift Detection

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8am UTC
  workflow_dispatch:       # Allow manual trigger

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION:  "1.7.5"
  WORKING_DIR: terraform
  AWS_REGION:  ap-south-1

jobs:
  drift-detection:
    name: Detect Infrastructure Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.WORKING_DIR }}

      - name: Terraform Plan (Drift Check)
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -no-color 2>&1 | tee plan_output.txt
          TF_EXIT=${PIPESTATUS[0]}
          echo "exit_code=${TF_EXIT}" >> $GITHUB_OUTPUT
          echo "Terraform exit code: ${TF_EXIT}"
          exit 0
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true

      - name: Report Drift
        run: |
          EXIT_CODE=${{ steps.plan.outputs.exit_code }}
          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ No drift detected — infrastructure matches Terraform state"
            echo "## ✅ No Drift Detected" >> $GITHUB_STEP_SUMMARY
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "⚠️ DRIFT DETECTED — infrastructure has changed outside Terraform!"
            echo "## ⚠️ Drift Detected" >> $GITHUB_STEP_SUMMARY
            cat plan_output.txt >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "❌ Terraform plan failed"
            exit 1
          fi
        working-directory: ${{ env.WORKING_DIR }}
